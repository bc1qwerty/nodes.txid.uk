<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Lightning Nodes | txid.uk</title>
<meta name="description" content="비트코인 라이트닝 네트워크 노드 탐색기">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="base.css"><link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
</head>
<body>
<header><div class="header-inner">
  <a href="https://txid.uk" class="logo">nodes.txid.uk</a>
  <nav>
    <a href="https://txid.uk">탐색기</a>
    <a href="https://stats.txid.uk">Stats</a>
    <a href="https://map.txid.uk">Map</a>
    <a href="#" class="active">Nodes</a>
  </nav>
  <button id="theme-btn" onclick="toggleTheme()">🌙</button>
</div></header>

<main>
  <div class="hero">
    <h1>Lightning <span class="accent">Nodes</span></h1>
    <p class="hero-sub">비트코인 라이트닝 네트워크 노드 탐색기</p>
  </div>

  <div class="content">
    <div class="search-row">
      <input id="node-search" class="input" placeholder="노드 Public Key 또는 별칭 검색" spellcheck="false">
      <button class="btn" onclick="searchNode()">검색</button>
    </div>

    <div id="global-stats" class="stats-grid"></div>

    <div class="two-col">
      <div class="card">
        <div class="section-title">⚡ 상위 노드 (용량 기준)</div>
        <div id="top-nodes"></div>
      </div>
      <div class="card">
        <div class="section-title">📊 네트워크 히스토리</div>
        <canvas id="network-chart" height="200"></canvas>
      </div>
    </div>

    <div id="node-detail" class="node-detail" style="display:none"></div>
  </div>
</main>

<footer><div class="footer-inner"><span>© 2025 txid.uk</span><span>mempool.space API</span></div></footer>
<script src="app.js"></script>
</body></html>
